name: Build naivecdn
on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
defaults:
  run:
    shell: bash
jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: android
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ^1.21
      - name: Build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w" -o naivecdn-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/naivecdn
      - uses: actions/upload-artifact@v4
        with:
          name: naivecdn-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go/naivecdn-*
      - name: Upload to release
        if: ${{ github.event_name == 'release' }}
        run: gh release upload "${GITHUB_REF##*/}" go/naivecdn-* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
